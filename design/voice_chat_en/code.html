<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ClawDroid - Voice Chat</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#cfbcff",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#ede6ee",
                        "surface-container-low": "#f8f1f9",
                        "secondary-fixed-dim": "#ccc2dc",
                        "on-secondary-fixed": "#1e192b",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#7d5260",
                        "secondary": "#625b71",
                        "on-primary-container": "#e0d2ff",
                        "on-tertiary-container": "#ffcbda",
                        "surface-tint": "#6750a4",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#22005d",
                        "surface-bright": "#fef7ff",
                        "error": "#ba1a1a",
                        "secondary-container": "#e8def9",
                        "surface-dim": "#ded8e0",
                        "tertiary": "#633b48",
                        "tertiary-fixed-dim": "#eeb8c8",
                        "outline": "#7a7582",
                        "on-primary": "#ffffff",
                        "on-primary-fixed-variant": "#4f378a",
                        "primary-container": "#6750a4",
                        "primary": "#4f378a",
                        "on-surface": "#1d1b20",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#633b48",
                        "tertiary-fixed": "#ffd9e3",
                        "inverse-surface": "#322f35",
                        "surface-container-highest": "#e7e0e8",
                        "surface-container": "#f2ecf4",
                        "on-secondary": "#ffffff",
                        "on-background": "#1d1b20",
                        "on-tertiary-fixed": "#31111d",
                        "inverse-primary": "#cfbcff",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e7e0e8",
                        "secondary-fixed": "#e8def9",
                        "primary-fixed": "#e9ddff",
                        "outline-variant": "#cbc4d2",
                        "background": "#fef7ff",
                        "surface": "#fef7ff",
                        "inverse-on-surface": "#f5eff6",
                        "on-secondary-container": "#686177",
                        "on-secondary-fixed-variant": "#4a4358",
                        "on-surface-variant": "#494551"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .fill-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        .pulse-gradient {
            background: linear-gradient(135deg, #4f378a, #6750a4);
            animation: pulse 2s infinite ease-in-out alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        
        .waveform-bar {
            background-color: #6750a4;
            border-radius: 9999px;
            margin: 0 2px;
            animation: waveform 1s infinite alternate ease-in-out;
        }
        @keyframes waveform {
            0% { height: 8px; }
            100% { height: 32px; }
        }
        .waveform-bar:nth-child(1) { animation-delay: 0.1s; }
        .waveform-bar:nth-child(2) { animation-delay: 0.3s; }
        .waveform-bar:nth-child(3) { animation-delay: 0.5s; }
        .waveform-bar:nth-child(4) { animation-delay: 0.2s; }
        .waveform-bar:nth-child(5) { animation-delay: 0.6s; }
        .waveform-bar:nth-child(6) { animation-delay: 0.4s; }
        .waveform-bar:nth-child(7) { animation-delay: 0.1s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar from JSON (Hidden on Mobile, Visible on Desktop for structural context, though technically this is a full-screen mobile app concept) -->
<header class="hidden md:flex fixed top-0 w-full z-50 items-center justify-between px-6 py-4 bg-[#FEF7FF]/80 backdrop-blur-2xl shadow-[0_8px_32px_rgba(79,55,138,0.06)] bg-[#EDE6EE]">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden flex items-center justify-center text-primary">
<span class="material-symbols-outlined fill-icon">person</span>
</div>
<h1 class="font-manrope font-bold text-[1.375rem] tracking-tight text-[#6750A4]">ClawDroid</h1>
</div>
<div class="flex items-center">
<button class="p-2 rounded-full hover:bg-[#E7E0E8]/50 transition-colors scale-95 active:scale-90 text-[#49454F]">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-between pt-12 pb-32 px-6 md:pt-24 relative overflow-hidden h-screen">
<!-- Status / Status Text -->
<div class="mt-16 text-center z-10 w-full flex flex-col items-center justify-center flex-grow-0">
<h2 class="font-headline text-[2.75rem] font-bold tracking-tight text-primary">Listening...</h2>
<p class="font-body text-body-lg text-on-surface-variant mt-2 max-w-md mx-auto">Speak naturally, I'm ready to assist.</p>
</div>
<!-- Central Mic Visualization -->
<div class="relative flex items-center justify-center flex-grow w-full z-10">
<!-- Pulsing Background Effect -->
<div class="absolute w-64 h-64 md:w-80 md:h-80 rounded-full bg-primary-fixed-dim/30 blur-3xl animate-pulse"></div>
<!-- Central Interactive Sphere -->
<div class="relative w-48 h-48 md:w-56 md:h-56 rounded-full pulse-gradient shadow-[0_8px_32px_rgba(79,55,138,0.2)] flex items-center justify-center">
<!-- Waveform Overlay -->
<div class="absolute flex items-center justify-center h-16 w-32">
<div class="waveform-bar w-1 h-2"></div>
<div class="waveform-bar w-1 h-6"></div>
<div class="waveform-bar w-1 h-4"></div>
<div class="waveform-bar w-1 h-8"></div>
<div class="waveform-bar w-1 h-5"></div>
<div class="waveform-bar w-1 h-7"></div>
<div class="waveform-bar w-1 h-3"></div>
</div>
</div>
</div>
<!-- Transcript / Short History Floating Card -->
<div class="w-full max-w-lg bg-surface-container-lowest/80 backdrop-blur-xl rounded-[1.5rem] p-6 mb-8 shadow-[0_8px_32px_rgba(79,55,138,0.06)] border border-outline-variant/20 z-10 flex-grow-0">
<div class="space-y-4">
<!-- AI Previous -->
<div class="flex items-start gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-sm text-primary">smart_toy</span>
</div>
<div class="bg-surface-container-highest rounded-tl-xl rounded-tr-xl rounded-bl-sm rounded-br-xl p-3 text-sm font-body text-on-surface">
<span class="font-semibold text-xs text-on-surface-variant block mb-1">AI</span>
                        I've configured the server. What's the next step?
                    </div>
</div>
<!-- User Previous -->
<div class="flex items-start gap-3 flex-row-reverse">
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-sm text-primary">person</span>
</div>
<div class="bg-secondary-container rounded-tl-xl rounded-tr-xl rounded-bl-xl rounded-br-sm p-3 text-sm font-body text-on-surface">
<span class="font-semibold text-xs text-on-surface-variant block mb-1 text-right">User</span>
                        Deploy the latest branch.
                    </div>
</div>
</div>
</div>
<!-- Floating Controls (Sit above bottom nav) -->
<div class="flex items-center justify-center gap-6 z-20 pb-8 md:pb-0">
<button aria-label="Stop" class="w-14 h-14 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant transition-colors flex items-center justify-center shadow-[0_4px_16px_rgba(79,55,138,0.04)]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<button aria-label="Microphone active" class="w-20 h-20 rounded-[1.5rem] bg-gradient-to-br from-primary to-primary-container text-on-primary hover:opacity-90 transition-opacity flex items-center justify-center shadow-[0_8px_24px_rgba(79,55,138,0.15)]">
<span class="material-symbols-outlined text-3xl fill-icon" data-icon="mic">mic</span>
</button>
<button aria-label="Settings" class="w-14 h-14 rounded-full bg-surface-container-high text-on-surface-variant hover:bg-surface-variant transition-colors flex items-center justify-center shadow-[0_4px_16px_rgba(79,55,138,0.04)]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</main>
<!-- BottomNavBar from JSON -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-safe bg-[#FEF7FF]/90 backdrop-blur-2xl rounded-t-[24px] z-50 shadow-[0_-8px_32px_rgba(79,55,138,0.06)] no-border tonal-shift-surface">
<!-- Inactive: Chat -->
<a class="flex flex-col items-center justify-center text-[#49454F] px-5 py-1 hover:bg-[#EADDFF]/40 transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="chat_bubble">chat_bubble</span>
<span class="font-manrope text-[12px] font-medium tracking-wide">Chat</span>
</a>
<!-- Active: Voice -->
<a class="flex flex-col items-center justify-center bg-[#E8DEF8] text-[#1D192B] rounded-[1.5rem] px-5 py-1 hover:bg-[#EADDFF]/40 transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined mb-1 fill-icon" data-icon="mic">mic</span>
<span class="font-manrope text-[12px] font-bold tracking-wide">Voice</span>
</a>
<!-- Inactive: Channels -->
<a class="flex flex-col items-center justify-center text-[#49454F] px-5 py-1 hover:bg-[#EADDFF]/40 transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="hub">hub</span>
<span class="font-manrope text-[12px] font-medium tracking-wide">Channels</span>
</a>
<!-- Inactive: Settings -->
<a class="flex flex-col items-center justify-center text-[#49454F] px-5 py-1 hover:bg-[#EADDFF]/40 transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-manrope text-[12px] font-medium tracking-wide">Settings</span>
</a>
</nav>
<!-- SafeArea Padding helper for mobile -->
<div class="h-safe md:hidden bg-[#FEF7FF]/90 w-full fixed bottom-0 z-40"></div>
</body></html>
